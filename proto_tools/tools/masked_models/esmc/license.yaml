notes: The toolkit's default ESM-C 300M (HuggingFace EvolutionaryScale/esmc-300m-2024-12) is under the permissive Cambrian Open License (commercial use OK with naming requirement). The 600M variant — also exposed by the toolkit via the 'esmc_600m' checkpoint — is under the Cambrian Non-Commercial License Agreement, which forbids commercial use. Marking restricted/false to flag the variant-dependent constraint; users picking the 300M default should treat as commercial-OK with attribution.
