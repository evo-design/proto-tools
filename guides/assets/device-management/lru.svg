<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" role="img" aria-label="LRU eviction: A, B, C each run once; A is evicted from cuda:0 because it was used least recently">
  <style>
    .label        { fill: #334155; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
    .muted        { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; }
    .caption      { fill: #475569; font-family: ui-serif, Georgia, serif; font-style: italic; font-size: 11px; }
    .gpu-label    { fill: #334155; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; font-weight: 600; }
    .lane         { fill: none; stroke: #CBD5E1; stroke-opacity: 0.6; }
    .resident-a   { fill: #4B85E8; fill-opacity: 0.28; }
    .resident-b   { fill: #8A6E3F; fill-opacity: 0.28; }
    .resident-c   { fill: #046E7A; fill-opacity: 0.28; }
    .active-a     { fill: #4B85E8; }
    .active-b     { fill: #8A6E3F; }
    .active-c     { fill: #046E7A; }
    .pill-text    { fill: #ffffff; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; font-weight: 600; }
    .release-bar  { stroke: #64748B; stroke-width: 1.6; fill: none; }
    .release-mark { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 700; }
    .discarded    { fill: #94A3B8; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; font-style: italic; }
    .axis         { stroke: #94A3B8; stroke-width: 1; fill: none; }
    @media (prefers-color-scheme: dark) {
      .label        { fill: #CBD5E1; }
      .muted        { fill: #94A3B8; }
      .caption      { fill: #CBD5E1; }
      .gpu-label    { fill: #CBD5E1; }
      .lane         { stroke: #334155; }
      .active-b     { fill: #B8945A; }
      .resident-b   { fill: #B8945A; fill-opacity: 0.28; }
      .active-c     { fill: #2A99A6; }
      .resident-c   { fill: #2A99A6; fill-opacity: 0.28; }
      .release-bar  { stroke: #94A3B8; }
      .release-mark { fill: #94A3B8; }
      .discarded    { fill: #64748B; }
      .axis         { stroke: #64748B; }
    }
  </style>

  <!-- Legend -->
  <rect x="60"  y="12" width="20" height="10" rx="2" class="active-a" />
  <text x="86"  y="21" class="muted">active</text>
  <rect x="140" y="12" width="20" height="10" rx="2" class="resident-a" />
  <text x="166" y="21" class="muted">resident (idle)</text>

  <!-- cuda:0 lane -->
  <text x="52" y="86" text-anchor="end" class="gpu-label">cuda:0</text>
  <rect x="60" y="70" width="400" height="32" rx="4" class="lane" />
  <!-- A: resident across full span until eviction; active flush at start -->
  <rect x="70" y="74" width="220" height="24" rx="3" class="resident-a" />
  <rect x="70" y="74" width="46"  height="24" rx="3" class="active-a" />
  <text x="93"  y="90" text-anchor="middle" class="pill-text">A</text>
  <!-- × at eviction point -->
  <text x="294" y="64" text-anchor="middle" class="release-mark" font-size="13">×</text>
  <line x1="294" y1="70" x2="294" y2="102" class="release-bar" />
  <!-- C: minimal resident since block exits immediately after active -->
  <rect x="298" y="74" width="54" height="24" rx="3" class="resident-c" />
  <rect x="298" y="74" width="46" height="24" rx="3" class="active-c" />
  <text x="321" y="90" text-anchor="middle" class="pill-text">C</text>

  <!-- cuda:1 lane -->
  <text x="52" y="136" text-anchor="end" class="gpu-label">cuda:1</text>
  <rect x="60" y="120" width="400" height="32" rx="4" class="lane" />
  <!-- B: resident from load through other-tasks and C's call; released when nested blocks exit -->
  <rect x="160" y="124" width="192" height="24" rx="3" class="resident-b" />
  <rect x="160" y="124" width="46"  height="24" rx="3" class="active-b" />
  <text x="183" y="140" text-anchor="middle" class="pill-text">B</text>

  <!-- LRU annotation -->
  <text x="294" y="170" text-anchor="middle" class="discarded">A was active longest ago → evicted when C needs a slot</text>

  <!-- Time axis -->
  <text x="24" y="192" class="muted">time</text>
  <line x1="24" y1="198" x2="452" y2="198" class="axis" />
  <polyline points="448,194 452,198 448,202" class="axis" />

  <!-- Bottom caption -->
  <text x="240" y="216" text-anchor="middle" class="caption">Every GPU full? DeviceManager evicts whichever worker has the oldest last-used time.</text>
</svg>
