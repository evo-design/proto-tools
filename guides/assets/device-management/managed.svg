<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 150" role="img" aria-label="Restricting the managed device pool excludes GPUs from DeviceManager's allocation">
  <style>
    .label          { fill: #334155; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
    .muted          { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; }
    .caption        { fill: #475569; font-family: ui-serif, Georgia, serif; font-style: italic; font-size: 11px; }
    .gpu-border     { stroke: #1E3A6A; stroke-opacity: 0.55; fill: none; }
    .gpu-border-out { stroke: #94A3B8; stroke-opacity: 0.45; stroke-dasharray: 4 3; fill: none; }
    .gpu-label      { fill: #334155; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; font-weight: 600; }
    .gpu-label-out  { fill: #94A3B8; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; font-weight: 600; }
    .pill-used      { fill: #4B85E8; }
    .pill-text      { fill: #ffffff; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; font-weight: 600; }
    .outside-text   { fill: #94A3B8; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; font-style: italic; }
    @media (prefers-color-scheme: dark) {
      .label          { fill: #CBD5E1; }
      .muted          { fill: #94A3B8; }
      .caption        { fill: #CBD5E1; }
      .gpu-border     { stroke: #4B85E8; stroke-opacity: 0.45; }
      .gpu-border-out { stroke: #475569; }
      .gpu-label      { fill: #CBD5E1; }
      .gpu-label-out  { fill: #64748B; }
      .outside-text   { fill: #64748B; }
    }
  </style>

  <text x="30" y="22" class="muted">managed pool</text>
  <text x="130" y="22" class="label">managed_devices=["cuda:1"]</text>

  <!-- GPU 0: outside pool -->
  <rect x="30"  y="32" width="130" height="56" rx="6" class="gpu-border-out" />
  <text x="40"  y="50" class="gpu-label-out">cuda:0</text>
  <text x="95"  y="73" text-anchor="middle" class="outside-text">outside pool</text>

  <!-- GPU 1: in pool, has esmfold -->
  <rect x="175" y="32" width="130" height="56" rx="6" class="gpu-border" />
  <text x="185" y="50" class="gpu-label">cuda:1</text>
  <rect x="185" y="58" width="110" height="22" rx="4" class="pill-used" />
  <text x="240" y="73" text-anchor="middle" class="pill-text">esmfold</text>

  <!-- GPU 2: outside pool -->
  <rect x="320" y="32" width="130" height="56" rx="6" class="gpu-border-out" />
  <text x="330" y="50" class="gpu-label-out">cuda:2</text>
  <text x="385" y="73" text-anchor="middle" class="outside-text">outside pool</text>

  <!-- Bottom caption -->
  <text x="240" y="120" text-anchor="middle" class="caption">General requests only land on managed GPUs; the rest are reserved for other work.</text>
</svg>
