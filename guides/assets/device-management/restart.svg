<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 230" role="img" aria-label="RESTART eviction timeline: A runs then sits idle on cuda:0, then is fully shut down when B takes over; nothing is offloaded to CPU">
  <style>
    .label        { fill: #334155; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
    .muted        { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; }
    .caption      { fill: #475569; font-family: ui-serif, Georgia, serif; font-style: italic; font-size: 11px; }
    .gpu-label    { fill: #334155; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; font-weight: 600; }
    .cpu-label    { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; font-weight: 600; }
    .lane         { fill: none; stroke: #CBD5E1; stroke-opacity: 0.6; }
    .cpu-lane     { fill: none; stroke: #94A3B8; stroke-opacity: 0.7; stroke-dasharray: 4 3; }
    .resident-a   { fill: #4B85E8; fill-opacity: 0.28; }
    .resident-b   { fill: #8A6E3F; fill-opacity: 0.28; }
    .active-a     { fill: #4B85E8; }
    .active-b     { fill: #8A6E3F; }
    .pill-text    { fill: #ffffff; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; font-weight: 600; }
    .release-bar  { stroke: #64748B; stroke-width: 1.6; fill: none; }
    .release-mark { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 700; }
    .discarded    { fill: #94A3B8; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; font-style: italic; }
    .empty-label  { fill: #94A3B8; font-family: ui-serif, Georgia, serif; font-style: italic; font-size: 11px; }
    .axis         { stroke: #94A3B8; stroke-width: 1; fill: none; }
    @media (prefers-color-scheme: dark) {
      .label        { fill: #CBD5E1; }
      .muted        { fill: #94A3B8; }
      .caption      { fill: #CBD5E1; }
      .gpu-label    { fill: #CBD5E1; }
      .cpu-label    { fill: #94A3B8; }
      .lane         { stroke: #334155; }
      .cpu-lane     { stroke: #475569; }
      .active-b     { fill: #B8945A; }
      .resident-b   { fill: #B8945A; fill-opacity: 0.28; }
      .release-bar  { stroke: #94A3B8; }
      .release-mark { fill: #94A3B8; }
      .discarded    { fill: #64748B; }
      .empty-label  { fill: #64748B; }
      .axis         { stroke: #64748B; }
    }
  </style>

  <!-- Legend -->
  <rect x="60"  y="12" width="20" height="10" rx="2" class="active-a" />
  <text x="86"  y="21" class="muted">active</text>
  <rect x="140" y="12" width="20" height="10" rx="2" class="resident-a" />
  <text x="166" y="21" class="muted">resident (idle)</text>

  <!-- cuda:0 lane -->
  <text x="52" y="76" text-anchor="end" class="gpu-label">cuda:0</text>
  <rect x="60" y="60" width="400" height="32" rx="4" class="lane" />

  <!-- A: resident full span, active flush at start -->
  <rect x="70" y="64" width="188" height="24" rx="3" class="resident-a" />
  <rect x="70" y="64" width="46"  height="24" rx="3" class="active-a" />
  <text x="93"  y="80" text-anchor="middle" class="pill-text">A</text>

  <!-- × eviction at A/B boundary -->
  <text x="262" y="54" text-anchor="middle" class="release-mark" font-size="13">×</text>
  <line x1="262" y1="60" x2="262" y2="92" class="release-bar" />

  <!-- B: brief resident after active since block exits immediately -->
  <rect x="266" y="64" width="54" height="24" rx="3" class="resident-b" />
  <rect x="266" y="64" width="46" height="24" rx="3" class="active-b" />
  <text x="289" y="80" text-anchor="middle" class="pill-text">B</text>

  <!-- Annotation under × -->
  <text x="262" y="108" text-anchor="middle" class="discarded">A shut down, memory freed</text>

  <!-- CPU lane — empty under RESTART -->
  <text x="52" y="138" text-anchor="end" class="cpu-label">CPU</text>
  <rect x="60" y="120" width="400" height="32" rx="4" class="cpu-lane" />
  <text x="240" y="140" text-anchor="middle" class="empty-label">nothing offloaded; RESTART discards the worker</text>

  <!-- Time axis -->
  <text x="24" y="178" class="muted">time</text>
  <line x1="24" y1="184" x2="452" y2="184" class="axis" />
  <polyline points="448,180 452,184 448,188" class="axis" />

  <!-- Bottom caption -->
  <text x="240" y="210" text-anchor="middle" class="caption">RESTART tears down the evicted worker entirely; reloading later pays the full startup cost.</text>
</svg>
