<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="Workers in a ToolPool block stay warm across calls; only the first call pays the load cost">
  <style>
    .label      { fill: #334155; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
    .muted      { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; }
    .caption    { fill: #475569; font-family: ui-serif, Georgia, serif; font-style: italic; font-size: 11px; }
    .gpu-label  { fill: #334155; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; font-weight: 600; }
    .lane       { fill: none; stroke: #CBD5E1; stroke-opacity: 0.6; }
    .resident   { fill: #4B85E8; fill-opacity: 0.28; }
    .load       { fill: #1E3A6A; }
    .load-text  { fill: #ffffff; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; font-weight: 600; }
    .active     { fill: #4B85E8; }
    .active-text{ fill: #ffffff; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; font-weight: 600; }
    .axis       { stroke: #94A3B8; stroke-width: 1; fill: none; }
    @media (prefers-color-scheme: dark) {
      .label     { fill: #CBD5E1; }
      .muted     { fill: #94A3B8; }
      .caption   { fill: #CBD5E1; }
      .gpu-label { fill: #CBD5E1; }
      .lane      { stroke: #334155; }
      .load      { fill: #3B5A8A; }
      .axis      { stroke: #64748B; }
    }
  </style>

  <!-- Legend -->
  <rect x="60"  y="12" width="20" height="10" rx="2" class="load" />
  <text x="86"  y="21" class="muted">load</text>
  <rect x="124" y="12" width="20" height="10" rx="2" class="active" />
  <text x="150" y="21" class="muted">active</text>
  <rect x="200" y="12" width="20" height="10" rx="2" class="resident" />
  <text x="226" y="21" class="muted">resident (idle)</text>

  <!-- cuda:0 lane -->
  <text x="52" y="66" text-anchor="end" class="gpu-label">cuda:0</text>
  <rect x="60" y="50" width="400" height="32" rx="4" class="lane" />
  <!-- Resident underlay for the whole pool block -->
  <rect x="70" y="54" width="280" height="24" rx="3" class="resident" />
  <!-- Cold call: load + active -->
  <rect x="70" y="54" width="30" height="24" rx="3" class="load" />
  <text x="85" y="70" text-anchor="middle" class="load-text">load</text>
  <rect x="100" y="54" width="50" height="24" rx="3" class="active" />
  <text x="125" y="70" text-anchor="middle" class="active-text">call 1</text>
  <!-- Warm call 2 -->
  <rect x="180" y="54" width="50" height="24" rx="3" class="active" />
  <text x="205" y="70" text-anchor="middle" class="active-text">call 2</text>
  <!-- Warm call 3 -->
  <rect x="260" y="54" width="50" height="24" rx="3" class="active" />
  <text x="285" y="70" text-anchor="middle" class="active-text">call 3</text>

  <!-- cuda:1 lane (mirrors cuda:0) -->
  <text x="52" y="106" text-anchor="end" class="gpu-label">cuda:1</text>
  <rect x="60" y="90" width="400" height="32" rx="4" class="lane" />
  <rect x="70" y="94" width="280" height="24" rx="3" class="resident" />
  <rect x="70" y="94" width="30" height="24" rx="3" class="load" />
  <text x="85" y="110" text-anchor="middle" class="load-text">load</text>
  <rect x="100" y="94" width="50" height="24" rx="3" class="active" />
  <text x="125" y="110" text-anchor="middle" class="active-text">call 1</text>
  <rect x="180" y="94" width="50" height="24" rx="3" class="active" />
  <text x="205" y="110" text-anchor="middle" class="active-text">call 2</text>
  <rect x="260" y="94" width="50" height="24" rx="3" class="active" />
  <text x="285" y="110" text-anchor="middle" class="active-text">call 3</text>

  <!-- Timing annotations -->
  <text x="125" y="144" text-anchor="middle" class="muted">cold</text>
  <text x="205" y="144" text-anchor="middle" class="muted">warm</text>
  <text x="285" y="144" text-anchor="middle" class="muted">warm</text>

  <!-- Time axis -->
  <text x="24" y="162" class="muted">time</text>
  <line x1="24" y1="168" x2="452" y2="168" class="axis" />
  <polyline points="448,164 452,168 448,172" class="axis" />

  <!-- Bottom caption -->
  <text x="240" y="192" text-anchor="middle" class="caption">Workers load once per GPU, stay resident for the whole block, and serve every later call warm.</text>
</svg>
