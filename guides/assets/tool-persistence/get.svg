<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 190" role="img" aria-label="Manual lifecycle: explicit get() loads the worker; shutdown() releases it on demand">
  <style>
    .label         { fill: #334155; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
    .muted         { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; }
    .caption       { fill: #475569; font-family: ui-serif, Georgia, serif; font-style: italic; font-size: 11px; }
    .load          { fill: #1E3A6A; }
    .infer         { fill: #4B85E8; }
    .load-text     { fill: #ffffff; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; font-weight: 600; }
    .infer-text    { fill: #ffffff; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; font-weight: 600; }
    .mem-bg        { fill: #DDE7F5; }
    .release-bar   { stroke: #64748B; stroke-width: 1.6; fill: none; }
    .release-mark  { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 700; }
    .marker        { stroke: #64748B; stroke-width: 1.2; fill: none; }
    .marker-head   { fill: #64748B; }
    .axis          { stroke: #94A3B8; stroke-width: 1; fill: none; }
    @media (prefers-color-scheme: dark) {
      .label        { fill: #CBD5E1; }
      .muted        { fill: #94A3B8; }
      .caption      { fill: #CBD5E1; }
      .load         { fill: #3B5A8A; }
      .mem-bg       { fill: #27324A; }
      .release-bar  { stroke: #94A3B8; }
      .release-mark { fill: #94A3B8; }
      .marker       { stroke: #94A3B8; }
      .marker-head  { fill: #94A3B8; }
      .axis         { stroke: #64748B; }
    }
  </style>

  <g transform="translate(50 0)">
    <!-- Legend -->
    <rect x="28"  y="12" width="14" height="10" rx="2" class="load" />
    <text x="48"  y="21" class="muted">load</text>
    <rect x="92"  y="12" width="14" height="10" rx="2" class="infer" />
    <text x="112" y="21" class="muted">infer</text>
    <rect x="156" y="13" width="14" height="8"  rx="1" class="mem-bg" />
    <text x="176" y="21" class="muted">model in memory</text>
    <text x="300" y="13" text-anchor="middle" class="release-mark" font-size="10">×</text>
    <line x1="300" y1="16" x2="300" y2="24" class="release-bar" />
    <text x="308" y="21" class="muted">release</text>

    <!-- Event labels -->
    <text x="82"  y="52" text-anchor="middle" class="label">get("esmfold")</text>
    <text x="308" y="52" text-anchor="middle" class="label">shutdown()</text>

    <!-- get() arrow pointing down into the load block -->
    <line x1="82" y1="60" x2="82" y2="78" class="marker" />
    <polygon points="78,74 82,82 86,74" class="marker-head" />

    <!-- Memory highlight behind the blocks -->
    <rect x="30" y="86" width="280" height="44" rx="4" class="mem-bg" />

    <!-- Load -->
    <rect x="32" y="94" width="100" height="28" rx="3" class="load" />
    <text x="82" y="113" text-anchor="middle" class="load-text">load</text>

    <!-- 4 infer blocks, back-to-back (one per sequence in the loop) -->
    <rect x="132" y="94" width="44" height="28" rx="3" class="infer" />
    <text x="154" y="113" text-anchor="middle" class="infer-text">infer</text>
    <rect x="176" y="94" width="44" height="28" rx="3" class="infer" />
    <text x="198" y="113" text-anchor="middle" class="infer-text">infer</text>
    <rect x="220" y="94" width="44" height="28" rx="3" class="infer" />
    <text x="242" y="113" text-anchor="middle" class="infer-text">infer</text>
    <rect x="264" y="94" width="44" height="28" rx="3" class="infer" />
    <text x="286" y="113" text-anchor="middle" class="infer-text">infer</text>

    <!-- Release (× above bar) aligned to end of blocks -->
    <text x="310" y="80" text-anchor="middle" class="release-mark" font-size="13">×</text>
    <line x1="310" y1="86" x2="310" y2="130" class="release-bar" />

    <!-- Annotations under the blocks -->
    <text x="82"  y="146" text-anchor="middle" class="muted">cold</text>
    <text x="220" y="146" text-anchor="middle" class="muted">warm across cells</text>
    <text x="310" y="146" text-anchor="middle" class="muted">released</text>
  </g>

  <!-- Time axis -->
  <text x="24"  y="163" class="muted">time</text>
  <line x1="24" y1="169" x2="452" y2="169" class="axis" />
  <polyline points="448,165 452,169 448,173" class="axis" />

  <!-- Bottom caption -->
  <text x="240" y="186" text-anchor="middle" class="caption">get() starts the worker; shutdown() releases it when you choose.</text>
</svg>
