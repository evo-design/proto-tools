<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 170" role="img" aria-label="With persist(): one load, many infers inside the with block">
  <style>
    .label         { fill: #334155; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
    .muted         { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; }
    .caption       { fill: #475569; font-family: ui-serif, Georgia, serif; font-style: italic; font-size: 11px; }
    .load          { fill: #1E3A6A; }
    .infer         { fill: #4B85E8; }
    .load-text     { fill: #ffffff; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; font-weight: 600; }
    .infer-text    { fill: #ffffff; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; font-weight: 600; }
    .mem-bg        { fill: #DDE7F5; }
    .block-border  { stroke: #4B85E8; stroke-opacity: 0.45; stroke-dasharray: 4 3; fill: none; }
    .release-bar   { stroke: #64748B; stroke-width: 1.6; fill: none; }
    .release-mark  { fill: #64748B; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 700; }
    .axis          { stroke: #94A3B8; stroke-width: 1; fill: none; }
    @media (prefers-color-scheme: dark) {
      .label        { fill: #CBD5E1; }
      .muted        { fill: #94A3B8; }
      .caption      { fill: #CBD5E1; }
      .load         { fill: #3B5A8A; }
      .mem-bg       { fill: #27324A; }
      .release-bar  { stroke: #94A3B8; }
      .release-mark { fill: #94A3B8; }
      .axis         { stroke: #64748B; }
    }
  </style>

  <g transform="translate(38 0)">
    <!-- Legend -->
    <rect x="28"  y="12" width="14" height="10" rx="2" class="load" />
    <text x="48"  y="21" class="muted">load</text>
    <rect x="92"  y="12" width="14" height="10" rx="2" class="infer" />
    <text x="112" y="21" class="muted">infer</text>
    <rect x="156" y="13" width="14" height="8"  rx="1" class="mem-bg" />
    <text x="176" y="21" class="muted">model in memory</text>
    <text x="300" y="13" text-anchor="middle" class="release-mark" font-size="10">×</text>
    <line x1="300" y1="16" x2="300" y2="24" class="release-bar" />
    <text x="308" y="21" class="muted">release</text>

    <!-- with-block label and outline -->
    <text x="30" y="44" class="muted">with ToolInstance.persist():</text>
    <rect x="22" y="50" width="332" height="60" rx="8" class="block-border" />

    <!-- Memory highlight spanning load + all infers -->
    <rect x="30" y="58" width="280" height="44" rx="4" class="mem-bg" />

    <!-- Load -->
    <rect x="32" y="66" width="100" height="28" rx="3" class="load" />
    <text x="82" y="85" text-anchor="middle" class="load-text">load</text>

    <!-- 4 infer blocks, back-to-back (one per sequence in the loop) -->
    <rect x="132" y="66" width="44" height="28" rx="3" class="infer" />
    <text x="154" y="85" text-anchor="middle" class="infer-text">infer</text>
    <rect x="176" y="66" width="44" height="28" rx="3" class="infer" />
    <text x="198" y="85" text-anchor="middle" class="infer-text">infer</text>
    <rect x="220" y="66" width="44" height="28" rx="3" class="infer" />
    <text x="242" y="85" text-anchor="middle" class="infer-text">infer</text>
    <rect x="264" y="66" width="44" height="28" rx="3" class="infer" />
    <text x="286" y="85" text-anchor="middle" class="infer-text">infer</text>

    <!-- Release (× above bar) at with-block exit, aligned to end of mem/blocks -->
    <text x="310" y="52" text-anchor="middle" class="release-mark" font-size="13">×</text>
    <line x1="310" y1="58" x2="310" y2="102" class="release-bar" />
    <text x="320" y="85" class="muted">on exit</text>
  </g>

  <!-- Time axis -->
  <text x="24"  y="124" class="muted">time</text>
  <line x1="24" y1="130" x2="452" y2="130" class="axis" />
  <polyline points="448,126 452,130 448,134" class="axis" />

  <!-- Bottom caption -->
  <text x="240" y="160" text-anchor="middle" class="caption">Model loads once; stays warm inside the with block and releases on exit.</text>
</svg>
